name: deeplink_menu_admin
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  image_picker: ^1.2.1
  http: ^1.6.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/deeplink_menu.png


flutter_launcher_icons:
  android: true
  ios: true

  image_path: assets/images/deeplink_menu.png

  adaptive_icon_background: "#030712"
  adaptive_icon_foreground: assets/images/deeplink_menu.png